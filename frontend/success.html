<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->

    <meta
        name="description"
        content="Your order has been placed successfully at AnthropicBots E-Commerce."
    >

    <meta
        name="keywords"
        content="order success, ecommerce confirmation, successful purchase"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >

    <title>
        Order Success | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->

    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/back-to-top.css"
    >

    <link
        rel="stylesheet"
        href="styles/success.css"
    >

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >

</head>

<body>

    <!-- Navbar -->

    <div id="navbar"></div>

    <!-- Success Section -->

    <section id="success-page">

        <div class="success-box">

            <!-- Icon -->

            <div class="success-icon">

                <i class="fas fa-check"></i>

            </div>

            <!-- Title -->

            <h2>

                Order Placed Successfully!

            </h2>

            <p>

                Thank you for shopping with
                AnthropicBots E-Commerce.

            </p>

            <!-- Order Info -->

            <div class="order-info">

                <p>

                    <strong>

                        Order ID:

                    </strong>

                    <span id="order-id">

                        ORD-0000

                    </span>

                </p>

                <p>

                    <strong>

                        Date:

                    </strong>

                    <span id="order-date"></span>

                </p>

                <p>

                    <strong>

                        Status:

                    </strong>

                    <span class="success-status">

                        Confirmed

                    </span>

                </p>

            </div>

            <!-- Buttons -->

            <div class="success-buttons">

                <a href="shop.html">

                    Continue Shopping

                </a>

                <a href="dashboard.html#orders">

                    View Orders

                </a>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <div id="footer"></div>

    <!-- Core Scripts -->

    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/auth.js"
    ></script>

    <script
        defer
        src="scripts/script.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Success Script -->

    <script
        defer
        src="scripts/success.js"
    ></script>
    <script defer src="scripts/ui.js"></script>

    <script
        defer
        src="scripts/back-to-top.js"
    ></script>

</body>

</html>
