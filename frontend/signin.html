<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->
    <link rel="canonical" href="https://www.bhuvansh.xyz/signin.html">
    <meta
        name="description"
        content="Sign in to your AnthropicBots E-Commerce account securely."
    >

    <meta
        name="keywords"
        content="signin, login, ecommerce authentication"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >

    <title>
        Sign In | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->
    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->
    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/back-to-top.css"
    >

    <link
        rel="stylesheet"
        href="styles/auth.css"
    >

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Signin -->
    <section class="auth-container">
        <div class="auth-box">
            <h2>
                Welcome Back
            </h2>
            <p>
                Login to continue shopping
            </p>

            <!-- Signin Form -->
            <form id="signin-form">
                <input
                    type="email"
                    id="signin-email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required
                >
                <input
                    type="password"
                    id="signin-password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required
                >
                <div style="text-align: right; margin-bottom: 15px;">
                    <a href="#" id="forgot-password-link" style="color: #088178; font-size: 14px; text-decoration: none;">Forgot Password?</a>
                </div>
                <button
                    type="submit"
                    class="auth-btn"
                >
                    Sign In
                </button>
            </form>

            <!-- Forgot Password Form (Hidden) -->
            <form id="forgot-password-form" style="display: none;">
                <p>Enter your email to receive a password reset OTP.</p>
                <input
                    type="email"
                    id="forgot-email"
                    placeholder="Email Address"
                    required
                >
                <button type="submit" class="auth-btn">Send OTP</button>
                <p class="auth-switch" style="margin-top: 15px;"><a href="#" id="back-to-login-link">Back to Login</a></p>
            </form>

            <!-- Reset OTP Form (Hidden) -->
            <form id="reset-otp-form" style="display: none;">
                <p>We've sent a 6-digit OTP to your email.</p>
                <input
                    type="text"
                    id="reset-otp-input"
                    placeholder="Enter 6-digit OTP"
                    maxlength="6"
                    required
                >
                <button type="submit" class="auth-btn">Verify OTP</button>
                <div style="text-align: center; margin-top: 15px;">
                    <p class="auth-switch" style="margin-top: 15px;">
                        Didn't receive code? <a href="#" id="resend-reset-otp-link">Resend OTP</a>
                        <span id="resend-reset-timer" style="display: none; color: #777;">(60s)</span>
                    </p>
                </div>
            </form>

            <!-- Set New Password Form (Hidden) -->
            <form id="set-new-password-form" style="display: none;">
                <p>Enter your new password.</p>
                <input
                    type="password"
                    id="new-password-input"
                    placeholder="New Password"
                    required
                >
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>
                    OR
                </span>
            </div>

            <!-- Social Login -->
            <button
                class="social-btn github-btn"
                id="github-login"
            >
                <i class="fab fa-github"></i>
                Continue with GitHub
            </button>
            <button
                class="social-btn apple-btn"
                id="apple-login"
            >
                <i class="fab fa-apple"></i>
                Continue with Apple
            </button>

            <!-- Switch -->
            <p class="auth-switch">
                Don't have an account?
                <a href="signup.html">
                    Create Account
                </a>
            </p>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Core Scripts -->
    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Firebase -->
    <script src="scripts/runtime-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="scripts/firebase.js"></script>
    
    <!-- Auth Script -->
    <script
        defer
        src="scripts/auth.js"
    ></script>
    <script defer src="scripts/ui.js"></script>

    <script
        defer
        src="scripts/back-to-top.js"
    ></script>

</body>
</html>
