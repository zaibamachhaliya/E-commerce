<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | AnthropicBots E-Commerce</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/wishlist.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
</head>
<body>
    <div id="navbar"></div>

    <!-- Wishlist Header -->
    <section id="wishlist-header">
        <h2>My Wishlist</h2>
        <p>Save your favorite products here</p>
    </section>

    <!-- Wishlist Products -->
    <section id="wishlist-page" class="section-p1">
        <div class="wishlist-container" id="wishlist-container"></div>

        <!-- Empty State -->
        <div id="empty-wishlist" class="empty-wishlist">
            <i class="far fa-heart"></i>
            <h3>Your wishlist is empty</h3>
            <p>Browse products and save your favorites.</p>
            <a href="shop.html">Continue Shopping</a>
        </div>
    </section>

    <div id="footer"></div>

    <!-- Components & Auth -->
    <script src="scripts/components.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/wishlist.js"></script>

</body>
</html>
