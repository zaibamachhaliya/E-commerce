<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->
    <link rel="canonical" href="https://www.bhuvansh.xyz/signup.html">
    <meta
        name="description"
        content="Create your AnthropicBots E-Commerce account and start shopping securely."
    >

    <meta
        name="keywords"
        content="signup, ecommerce account, create account, register"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >
    <title>
        Sign Up | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->
    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->
    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/back-to-top.css"
    >

    <link
        rel="stylesheet"
        href="styles/auth.css"
    >

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Signup -->
    <section class="auth-container">
        <div class="auth-box">
            <h2>
                Create Account
            </h2>
            <p>
                Join AnthropicBots E-Commerce
            </p>

            <!-- Signup Form -->
            <form id="signup-form" data-auth-form="signup">
                <input
                    type="text"
                    id="signup-name"
                    name="name"
                    placeholder="Full Name"
                    autocomplete="name"
                    required
                >
                <input
                    type="email"
                    id="signup-email"
                    name="email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required
                >

                <!-- Password input with toggle -->
                <div class="password-field">
                    <input
                        type="password"
                        id="signup-password"
                        name="password"
                        placeholder="Password"
                        autocomplete="new-password"
                        required
                    >
                    <button
                        type="button"
                        class="password-toggle"
                        aria-label="Show password"
                        aria-pressed="false"
                    >
                        <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                </div>

                <!-- Password Strength Meter -->
                <div id="password-strength-container" style="margin-top: 8px;">
                    <div id="password-strength-bar" style="height: 6px; border-radius: 4px; background: #e0e0e0; overflow: hidden;">
                        <div id="password-strength-fill" style="height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s ease;"></div>
                    </div>
                    <div id="password-strength-text" style="font-size: 0.85rem; margin-top: 4px; font-weight: 500; color: #666;">Weak</div>
                    <div id="password-strength-tips" style="font-size: 0.8rem; color: #888; margin-top: 4px; min-height: 20px;"></div>
                </div>

                <button
                    type="submit"
                    class="auth-btn"
                    id="signup-btn"
                >
                    Create Account
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>
                    OR
                </span>
            </div>

            <!-- Social Buttons -->
            <button
                class="social-btn google-btn"
                id="google-login"
            >
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
            <button
                class="social-btn github-btn"
                id="github-login"
            >
                <i class="fab fa-github"></i>
                Continue with GitHub
            </button>
            <button
                class="social-btn apple-btn"
                id="apple-login"
            >
                <i class="fab fa-apple"></i>
                Continue with Apple
            </button>

            <!-- Switch -->
            <p class="auth-switch">
                Already have an account?
                <a href="signin.html">
                    Sign In
                </a>
            </p>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Core Scripts -->
    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Auth Script -->
    <script
        defer
        src="scripts/auth.js"
    ></script>
    <script defer src="scripts/ui.js"></script>

    <script
        defer
        src="scripts/back-to-top.js"
    ></script>

</body>
</html>
