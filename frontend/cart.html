<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->

    <meta
        name="description"
        content="Review your shopping cart, update quantities, and proceed securely to checkout."
    >

    <meta
        name="keywords"
        content="shopping cart, ecommerce cart, checkout, online shopping"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >

    <title>
        Cart | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->

    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/cart.css"
    >

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >

</head>

<body>

    <!-- Navbar -->

    <div id="navbar"></div>

    <!-- Cart Header -->

    <section id="cart-header">

        <h2>

            Your Shopping Cart

        </h2>

        <p>

            Review your items before checkout

        </p>

    </section>

    <!-- Cart Section -->

    <section
        id="cart-page"
        class="section-p1"
    >

        <!-- Cart Items -->

        <div class="cart-items-container">

            <h2>

                Cart Items

            </h2>

            <div id="cart-items"></div>

        </div>

        <!-- Summary -->

        <div class="cart-summary">

            <h2>

                Order Summary

            </h2>

            <div class="summary-row">

                <span>

                    Subtotal

                </span>

                <span id="subtotal">

                    ₹0

                </span>

            </div>

            <div class="summary-row">

                <span>

                    Tax (18%)

                </span>

                <span id="tax">

                    ₹0

                </span>

            </div>

            <div class="summary-row">

                <span>

                    Shipping

                </span>

                <span id="shipping">

                    Free

                </span>

            </div>

            <div class="summary-row total">

                <span>

                    Total

                </span>

                <span id="total">

                    ₹0

                </span>

            </div>

            <button id="checkout-btn">

                Proceed to Checkout

            </button>

        </div>

    </section>

    <!-- Footer -->

    <div id="footer"></div>

    <!-- Core Scripts -->

    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/auth.js"
    ></script>

    <script
        defer
        src="scripts/script.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    

    <!-- Cart Scripts -->

    <script
        defer
        src="scripts/cart.js"
    ></script>
     <script defer src="scripts/ui.js"></script>

</body>

</html>
