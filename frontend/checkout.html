<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->

    <meta
        name="description"
        content="Securely complete your order with multiple payment methods and seamless checkout experience."
    >

    <meta
        name="keywords"
        content="checkout, payment, ecommerce checkout, online shopping"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >

    <title>
        Checkout | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->

    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/back-to-top.css"
    >

    <link
        rel="stylesheet"
        href="styles/checkout.css"
    >

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >

</head>

<body>

    <!-- Navbar -->

    <div id="navbar"></div>

    <!-- Checkout Header -->

    <section id="checkout-header">

        <h2>

            Checkout

        </h2>

        <p>

            Complete your order securely

        </p>

    </section>

    <!-- Checkout -->

    <section
        id="checkout-page"
        class="section-p1"
    >

        <!-- Billing -->

        <div class="checkout-form-container">

            <h2>

                Billing Information

            </h2>

            <form id="checkout-form">

                <!-- Row -->

                <div class="form-row">

                    <input
                        type="text"
                        id="full-name"
                        placeholder="Full Name"
                        required
                    >

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required
                    >

                </div>

                <!-- Row -->

                <div class="form-row">

                    <input
                        type="tel"
                        id="phone"
                        placeholder="Phone Number"
                        required
                    >

                    <input
                        type="text"
                        id="city"
                        placeholder="City"
                        required
                    >

                </div>

                <!-- Row -->

                <div class="form-row">

                    <input
                        type="text"
                        id="state"
                        placeholder="State"
                        required
                    >

                    <input
                        type="text"
                        id="zip"
                        placeholder="ZIP Code"
                        required
                    >

                </div>

                <!-- Address -->

                <textarea
                    id="address"
                    placeholder="Full Address"
                    required
                ></textarea>

                <!-- Payment -->

                <h3>

                    Payment Method

                </h3>

                <div class="payment-options">

                    <label>

                        <input
                            type="radio"
                            name="payment"
                            value="card"
                            checked
                        >

                         Credit / Debit Card

                    </label>

                    <label>

                        <input
                            type="radio"
                            name="payment"
                            value="upi"
                        >

                         UPI Payment

                    </label>

                    <label>

                        <input
                            type="radio"
                            name="payment"
                            value="cod"
                        >

                        Cash On Delivery

                    </label>

                </div>

                <!-- Card -->

                <div id="card-details">

                    <input
                        type="text"
                        id="card-number"
                        placeholder="Card Number"
                    >

                    <div class="form-row">

                        <input
                            type="text"
                            id="expiry"
                            placeholder="MM/YY"
                        >

                        <input
                            type="password"
                            id="cvv"
                            placeholder="CVV"
                        >

                    </div>

                </div>

                <!-- Submit -->

                <button type="submit">

                    Place Order

                </button>

            </form>

        </div>

        <!-- Summary -->

        <div class="checkout-summary">

            <h2>

                Order Summary

            </h2>

            <div id="checkout-items"></div>

            <div class="summary-row">

                <span>

                    Subtotal

                </span>

                <span id="checkout-subtotal">

                    ₹0

                </span>

            </div>

            <div class="summary-row">

                <span>

                    Tax (18%)

                </span>

                <span id="checkout-tax">

                    ₹0

                </span>

            </div>

            <div class="summary-row">

                <span>

                    Shipping

                </span>

                <span id="checkout-shipping">

                    Free

                </span>

            </div>

            <div class="summary-row total">

                <span>

                    Total

                </span>

                <span id="checkout-total">

                    ₹0

                </span>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <div id="footer"></div>

    <!-- Core Scripts -->

    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/auth.js"
    ></script>

    <script
        defer
        src="scripts/script.js"
    ></script>

    <script
        defer
        src="scripts/back-to-top.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Checkout Script -->

    <script
        defer
        src="scripts/checkout.js"
    ></script>
    <script defer src="scripts/ui.js"></script>

</body>

</html>
