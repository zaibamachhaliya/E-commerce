<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->

    <meta
        name="description"
        content="Admin dashboard for managing products, orders, users, inventory, and analytics."
    >

    <meta
        name="keywords"
        content="admin dashboard, ecommerce admin, product management, orders"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >

    <title>
        Admin Panel | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->

    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/back-to-top.css"
    >

    <link
        rel="stylesheet"
        href="styles/admin.css"
    >

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >

</head>

<body>

    <!-- Navbar -->

    <div id="navbar"></div>

    <!-- Admin Dashboard -->

    <section id="admin-dashboard">

        <!-- Sidebar -->

        <div class="admin-sidebar">

            <h2>

                Admin Panel

            </h2>

            <ul>

                <li class="active-admin-tab">

                    <i class="fas fa-chart-line"></i>

                    Dashboard

                </li>

                <li>

                    <i class="fas fa-box"></i>

                    Products

                </li>

                <li>

                    <i class="fas fa-shopping-bag"></i>

                    Orders

                </li>

                <li>

                    <i class="fas fa-users"></i>

                    Users

                </li>

                <li>

                    <i class="fas fa-cog"></i>

                    Settings

                </li>

            </ul>

        </div>

        <!-- Content -->

        <div class="admin-content">

            <!-- Stats -->

            <div class="admin-stats">

                <div class="admin-card">

                    <h3>

                        Total Orders

                    </h3>

                    <p id="total-orders">

                        0

                    </p>

                </div>

                <div class="admin-card">

                    <h3>

                        Total Revenue

                    </h3>

                    <p id="total-revenue">

                        ₹0

                    </p>

                </div>

                <div class="admin-card">

                    <h3>

                        Total Users

                    </h3>

                    <p id="total-users">

                        0

                    </p>

                </div>

                <div class="admin-card">

                    <h3>

                        Products

                    </h3>

                    <p id="total-products">

                        0

                    </p>

                </div>

            </div>

            <!-- Product Form -->

            <div class="admin-section">

                <h2>

                    Add Product

                </h2>

                <form id="product-form">

                    <div class="form-grid">

                        <input
                            type="text"
                            id="product-name"
                            placeholder="Product Name"
                            required
                        >

                        <input
                            type="number"
                            id="product-price"
                            placeholder="Price"
                            required
                        >

                        <select id="product-category">

                            <option value="fashion">

                                Fashion

                            </option>

                            <option value="hoodie">

                                Hoodie

                            </option>

                            <option value="shoes">

                                Shoes

                            </option>

                            <option value="accessories">

                                Accessories

                            </option>

                        </select>

                        <input
                            type="number"
                            id="product-stock"
                            placeholder="Stock"
                            required
                        >

                        <select id="product-status">

                            <option value="In Stock">

                                In Stock

                            </option>

                            <option value="Out Of Stock">

                                Out Of Stock

                            </option>

                            <option value="Hidden">

                                Hidden

                            </option>

                        </select>

                    </div>

                    <textarea
                        id="product-description"
                        placeholder="Product Description"
                        required
                    ></textarea>

                    <input
                        type="url"
                        id="product-image"
                        placeholder="Image URL"
                        required
                    >

                    <div class="featured-toggle">

                        <label>

                            <input
                                type="checkbox"
                                id="featured-product"
                            >

                            Featured Product

                        </label>

                    </div>

                    <button type="submit">

                        Add Product

                    </button>

                </form>

            </div>

            <!-- Product Table -->

            <div class="admin-section">

                <h2>

                    Product Management

                </h2>

                <table>

                    <thead>

                        <tr>

                            <th>Product</th>

                            <th>Category</th>

                            <th>Price</th>

                            <th>Stock</th>

                            <th>Status</th>

                            <th>Featured</th>

                            <th>Inventory</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="product-table-body"></tbody>

                </table>

            </div>

            <!-- Orders -->

            <div class="admin-section">

                <h2>

                    Recent Orders

                </h2>

                <table>

                    <thead>

                        <tr>

                            <th>Order ID</th>

                            <th>Date</th>

                            <th>Items</th>

                        </tr>

                    </thead>

                    <tbody id="orders-table-body"></tbody>

                </table>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <div id="footer"></div>

    <!-- Core Scripts -->

    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/auth.js"
    ></script>

    <script
        defer
        src="scripts/script.js"
    ></script>

    <script
        defer
        src="scripts/back-to-top.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Admin Script -->
    <script
        defer
        src="scripts/admin.js"
    ></script>
    <script defer src="scripts/ui.js"></script>
</body>
</html>
