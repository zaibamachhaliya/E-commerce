<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->
    <meta
        name="description"
        content="Manage your AnthropicBots E-Commerce profile, account details, and preferences."
    >

    <meta
        name="keywords"
        content="profile, ecommerce account, user profile, account settings"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >

    <title>
        Profile | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->
    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->
    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/profile.css"
    >

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Profile Header -->
    <section id="profile-header">
        <h2>
            My Profile
        </h2>
        <p>
            Manage your account information
        </p>
    </section>

    <!-- Profile Section -->
    <section
        id="profile-page"
        class="section-p1"
    >
        <div class="profile-container">
            <!-- Sidebar -->
            <div class="profile-sidebar">
                <div class="avatar-wrapper">
                    <img
                        id="profile-preview"
                        src="https://ui-avatars.com/api/?name=User&background=088178&color=fff"
                        alt="Profile Avatar"
                        loading="lazy"
                    >
                    <label
                        for="avatar-input"
                        class="upload-btn"
                    >
                        Change Avatar
                    </label>
                    <input
                        type="file"
                        id="avatar-input"
                        accept="image/*"
                    >
                </div>
                <h3 id="sidebar-name">
                    User Name
                </h3>
                <p id="sidebar-email">
                    user@example.com
                </p>
            </div>

            <!-- Profile Content -->
            <div class="profile-content">
                <!-- Profile View -->
                <div
                    id="profile-view"
                    class="profile-view"
                >
                    <div class="profile-info-card">
                        <h3>
                            Personal Information
                        </h3>
                    
                        <div class="profile-info-item">
                            <span>Full Name</span>
                            <p id="view-name"></p>
                        </div>
                    
                        <div class="profile-info-item">
                            <span>Email Address</span>
                            <p id="view-email"></p>
                        </div>
                    
                        <div class="profile-info-item">
                            <span>Phone Number</span>
                            <p id="view-phone"></p>
                        </div>
                    
                        <div class="profile-info-item">
                            <span>Address</span>
                            <p id="view-address"></p>
                        </div>
                    
                        <div class="profile-info-item">
                            <span>Bio</span>
                            <p id="view-bio"></p>
                        </div>
                    
                        <button
                            id="edit-profile-btn"
                            class="profile-save-btn"
                        >
                            <i class="fas fa-edit"></i>
                            Edit Profile
                        </button>
                    </div>
                </div>
            
                <!-- Profile Edit -->
                <div
                    id="profile-edit"
                    class="profile-edit"
                >
                    <form id="profile-form">
                    
                        <div class="form-group">
                            <label for="profile-name">
                                Full Name
                            </label>
                        
                            <input
                                type="text"
                                id="profile-name"
                                placeholder="Full Name"
                            >
                        </div>
                    
                        <div class="form-group">
                            <label for="profile-email">
                                Email Address
                            </label>
                        
                            <input
                                type="email"
                                id="profile-email"
                                placeholder="Email Address"
                            >
                        </div>
                    
                        <div class="form-group">
                            <label for="profile-phone">
                                Phone Number
                            </label>
                        
                            <input
                                type="tel"
                                id="profile-phone"
                                placeholder="Phone Number"
                            >
                        </div>
                    
                        <div class="form-group">
                            <label for="profile-address">
                                Address
                            </label>
                        
                            <textarea
                                id="profile-address"
                                placeholder="Address"
                            ></textarea>
                        </div>
                    
                        <div class="form-group">
                            <label for="profile-bio">
                                Bio
                            </label>
                        
                            <textarea
                                id="profile-bio"
                                placeholder="Short Bio"
                            ></textarea>
                        </div>
                    
                        <button
                            type="submit"
                            class="profile-save-btn"
                        >
                            <i class="fas fa-save"></i>
                            Save Profile
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Core Scripts -->
    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/auth.js"
    ></script>

    <script
        defer
        src="scripts/script.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Profile Script -->
    <script
        defer
        src="scripts/profile.js"
    ></script>
    <script defer src="scripts/ui.js"></script>

</body>
</html>
